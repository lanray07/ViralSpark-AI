name: Build and Upload to App Store Connect

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-store-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_PRIVATE_KEY_BASE64"

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Resolve packages
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ViralSparkAI.xcodeproj \
            -scheme ViralSparkAI \
            -resolvePackageDependencies

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ViralSparkAI.xcodeproj \
            -scheme ViralSparkAI \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ViralSparkAI.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            DEVELOPMENT_TEAM=5ZP6GV85J6 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Upload archive to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/ViralSparkAI.xcarchive" \
            -exportOptionsPlist Tools/ExportOptions-AppStore.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Clean up API key
        if: always()
        shell: bash
        run: rm -rf "$RUNNER_TEMP/private_keys"
