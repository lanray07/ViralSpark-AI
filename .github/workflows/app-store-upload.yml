name: Build and Upload to App Store Connect

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-store-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_APP_STORE_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_PRIVATE_KEY_BASE64"
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_BASE64"
          test -n "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD"
          test -n "$IOS_APP_STORE_PROFILE_BASE64"

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Install signing assets
        shell: bash
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/app-store.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/app-store-profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_APP_STORE_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Distribution/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            echo "No distribution signing identity found in the imported certificate."
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")"
          PROFILE_SPECIFIER="$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
            echo "PROFILE_SPECIFIER=$PROFILE_SPECIFIER"
          } >> "$GITHUB_ENV"

          echo "Installed signing identity: $SIGNING_IDENTITY"
          echo "Installed provisioning profile: $PROFILE_SPECIFIER ($PROFILE_UUID)"

      - name: Generate export options
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions-AppStore.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.viralsparkai.app</key>
              <string>$PROFILE_SPECIFIER</string>
            </dict>
            <key>signingCertificate</key>
            <string>$SIGNING_IDENTITY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>5ZP6GV85J6</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Resolve packages
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ViralSparkAI.xcodeproj \
            -scheme ViralSparkAI \
            -resolvePackageDependencies

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ViralSparkAI.xcodeproj \
            -scheme ViralSparkAI \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/ViralSparkAI.xcarchive" \
            DEVELOPMENT_TEAM=5ZP6GV85J6 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPECIFIER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Upload archive to App Store Connect
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/ViralSparkAI.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-AppStore.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Clean up API key
        if: always()
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP/private_keys"
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
